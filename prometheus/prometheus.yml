global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'product-catalog'
    static_configs:
      - targets: ['product-catalog:5001']

  - job_name: 'shopping-cart'
    static_configs:
      - targets: ['shopping-cart:5002']

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:5000']
